<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Sudarshan AI — Cybersecurity Intelligence for India</title>
    <meta name="description" content="Sudarshan AI is an intelligent cybersecurity companion designed to help you understand, prevent, and respond to cyber threats. Built for India." />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="icon" type="image/x-icon" href="/src/assets/branding/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/src/assets/branding/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/src/assets/branding/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/src/assets/branding/apple-touch-icon.png" />
    <link rel="manifest" href="/src/assets/branding/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="Sudarshan AI — Cybersecurity Intelligence for India" />
    <meta property="og:description" content="AI-powered cybersecurity assistant. Understand scams, fraud, identity theft, and Indian cyber laws." />
    <meta property="og:type" content="website" />

    <!-- Fonts: Inter 300–700 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Theme Flash Prevention -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('sudarshan-theme') || 'dark';
          if (theme === 'system') {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
          } else {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
